<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Neon Wireframe Diamond</title>
  <style>
    body {
      margin: 0;
      background: #020617;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script type="module">
  import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

  // Scene
  const scene = new THREE.Scene();

  // Camera
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.z = 3;

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Geometry
  const geometry = new THREE.OctahedronGeometry(1);

  // Solid diamond
  const solidMaterial = new THREE.MeshStandardMaterial({
    color: 0x0ea5e9,
    roughness: 0.15,
    metalness: 0.9
  });

  const diamond = new THREE.Mesh(geometry, solidMaterial);
  scene.add(diamond);

  // Neon wireframe overlay
  const wireMaterial = new THREE.MeshBasicMaterial({
    color: 0x22d3ee,
    wireframe: true,
    transparent: true,
    opacity: 0.9
  });

  const wireframe = new THREE.Mesh(geometry, wireMaterial);
  wireframe.scale.setScalar(1.01); // prevent z-fighting
  scene.add(wireframe);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  const light = new THREE.DirectionalLight(0xffffff, 1.2);
  light.position.set(5, 5, 5);
  scene.add(light);

  // Animation
  function animate() {
    diamond.rotation.x += 0.01;
    diamond.rotation.y += 0.015;

    wireframe.rotation.copy(diamond.rotation);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  animate();

  // Resize
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
