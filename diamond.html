
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  body {
    margin: 0;
    background: #020617;
    display: grid;
    place-items: center;
    height: 100vh;
  }

  canvas {
    background: #020617;
  }
</style>
</head>
<body>

<canvas id="c" width="300" height="300"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let angle = 0;

function draw() {
  // Fade previous frames (trail effect)
  ctx.fillStyle = "rgba(2, 6, 23, 0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(150, 150);
  ctx.rotate(angle);

  // Neon glow
  ctx.shadowColor = "#22d3ee";
  ctx.shadowBlur = 35;
  ctx.fillStyle = "#22d3ee";

  // Diamond shape
  ctx.beginPath();
  ctx.moveTo(0, -50);
  ctx.lineTo(50, 0);
  ctx.lineTo(0, 50);
  ctx.lineTo(-50, 0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  angle += 0.04;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
