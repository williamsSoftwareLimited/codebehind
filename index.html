<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" href="favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="chatbot.css">
    <title>codebehind </title>
    <script src='codebehind.js' defer></script>
    <script src='chatbot.js' defer></script>
    <script>
      try {
        CSS.registerProperty({
          name: '--bg-color',
          syntax: '<color>',
          inherits: false,
          initialValue: '#020617'
        });
      } catch(e) {}
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        --bg-color: #020617;
        background: linear-gradient(var(--bg-color), #0a1628);
        transition: --bg-color 8s;
        overflow: hidden;
        position: relative;
        /* Trigger bg transition on touch via JS-added class instead of :hover */
      }
      body.touched {
        --bg-color: #020f2e;
      }

      #starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      #stars {
        position: absolute;
        inset: 0;
      }

      .star {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #c7edff 45%, rgba(199, 237, 255, 0) 100%);
        animation-name: wink;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      @keyframes wink {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }

      #constellations {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .constellation-line {
        stroke: rgba(173, 216, 255, 0.45);
        stroke-width: 0.2;
      }

      .constellation-star {
        fill: #dff4ff;
        filter: drop-shadow(0 0 3px #9ed9ff);
      }

      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
        cursor: default;
        /* Prevent callout/highlight on long-press on mobile */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        position: relative;
        z-index: 1;
      }

      #diamond-canvas {
        /* Larger on portrait mobile, capped on desktop */
        width: min(70vmin, 340px);
        height: min(70vmin, 340px);
        display: block;
        flex-shrink: 0;
        touch-action: none; /* prevent scroll-hijack on canvas */
      }

      code-behind {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        color: #7dd3fc;
        font: bold calc(1.4rem + 3vw) 'Raleway', sans-serif;
        text-shadow: #22d3ee 1px 0 14px;
        margin-top: -0.5rem;
      }

      span {
        padding: 4px;
      }

      #C {
        scale: 300%;
        color: #bae6fd;
        transform: translate(5px, -2px);
        text-shadow: #38bdf8 1px 0 18px;
      }

      .saturn-orbit {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding-right: 0.45em;
      }

      #o {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1.05em;
        height: 1.05em;
        transform: translate(-50%, -50%) rotate(0deg) translateX(28px) rotate(0deg);
        animation: 6.5s linear infinite orbit-c;
        color: transparent;
        pointer-events: none;
      }
      #o::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0.52em;
        height: 0.52em;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #d9f2ff 0%, #7dd3fc 55%, #0ea5e9 100%);
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px #38bdf8;
      }
      #o::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0.95em;
        height: 0.38em;
        border: 2px solid rgba(186, 230, 253, 0.9);
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(-22deg);
        box-shadow: 0 0 8px rgba(34, 211, 238, 0.7);
      }
      @keyframes orbit-c {
        from { transform: translate(-50%, -50%) rotate(0deg) translateX(28px) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg) translateX(28px) rotate(-360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #o {
          animation: none;
          transform: translate(-50%, -50%) translateX(28px);
        }
      }

      #d {
        transform: translate(0px, 1px);
        animation: 14s infinite alternate small-d;
      }
      @keyframes small-d {
        0%  { color: #7dd3fc; }
        50% { color: #22d3ee; }
      }

      #b {
        animation: 7s infinite alternate small-b;
        color: #7dd3fc;
        transform: translate(0px, 4px);
      }
      @keyframes small-b {
        0%   { scale: 100%; transform: translate(0px, 2px); }
        50%  { scale: 112%; transform: translate(0px, 4px); }
      }

      #e { transform: rotate(3deg); }

      .fade-in {
        display: block;
        animation: fade-in 3s ease-in forwards;
      }
      @keyframes fade-in {
        0%   { opacity: 0.5; }
        100% { opacity: 1; }
      }
      .fade-out {
        display: block;
        animation: fade-out 3s ease-out forwards;
      }
      @keyframes fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0.5; }
      }

      /* #h needs a larger touch target on mobile */
      #h {
        position: relative;
        cursor: pointer;
        padding: 8px;
        /* Explicit base values so CSS transitions have a start point */
        color: #7dd3fc;
        text-shadow: #22d3ee 1px 0 14px;
      }

      /* Bright-flash state: intense white/cyan glow */
      #h.bright {
        color: #ffffff;
        text-shadow:
          0 0 10px #ffffff,
          0 0 30px #ffffff,
          0 0 60px #bae6fd,
          0 0 100px #7dd3fc,
          0 0 160px #22d3ee;
      }

      #dot {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 0.72em;
        height: 0.72em;
        transform: translate(-52px, -40px);
      }
      #dot .quasar-core {
        width: 56%;
        height: 56%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1f2937 0%, #06080c 52%, #000000 100%);
        box-shadow: 0 0 0.18em rgba(10, 10, 10, 0.95), 0 0 0.42em rgba(56, 189, 248, 0.18);
        z-index: 3;
      }
      #dot .quasar-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(56, 189, 248, 0.24) 0deg,
          rgba(30, 58, 138, 0.4) 110deg,
          rgba(12, 17, 28, 0.9) 220deg,
          rgba(56, 189, 248, 0.2) 360deg
        );
        filter: blur(0.4px);
        will-change: transform;
        animation: 26s linear infinite quasar-spin;
        z-index: 1;
      }
      @keyframes quasar-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      #n   { transform: translate(-42px, 4px); }

      #end {
        transform: translate(-60px, 2px);
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* end-d triggered by JS class instead of :hover */
      #end.wobbling {
        animation: 4s alternate end-d;
      }
      @keyframes end-d {
        0%  { transform: translate(-60px, 2px) rotate(0deg); }
        50% { transform: translate(-65px, 0px) rotate(-20deg); }
      }

    </style>
  </head>
  <body>
    <div id="starfield" aria-hidden="true">
      <div id="stars"></div>
      <svg id="constellations" viewBox="0 0 100 100" preserveAspectRatio="none">
        <!-- Orion -->
        <line class="constellation-line" x1="68" y1="12" x2="63" y2="24"></line>
        <line class="constellation-line" x1="63" y1="24" x2="67" y2="33"></line>
        <line class="constellation-line" x1="67" y1="33" x2="61" y2="46"></line>
        <line class="constellation-line" x1="61" y1="46" x2="70" y2="52"></line>
        <line class="constellation-line" x1="64" y1="28" x2="66" y2="31"></line>
        <line class="constellation-line" x1="66" y1="31" x2="68" y2="34"></line>
        <circle class="constellation-star" cx="68" cy="12" r="0.45"></circle>
        <circle class="constellation-star" cx="63" cy="24" r="0.4"></circle>
        <circle class="constellation-star" cx="67" cy="33" r="0.38"></circle>
        <circle class="constellation-star" cx="61" cy="46" r="0.35"></circle>
        <circle class="constellation-star" cx="70" cy="52" r="0.35"></circle>
        <circle class="constellation-star" cx="64" cy="28" r="0.27"></circle>
        <circle class="constellation-star" cx="66" cy="31" r="0.27"></circle>
        <circle class="constellation-star" cx="68" cy="34" r="0.27"></circle>

        <!-- Seven Sisters (Pleiades) -->
        <line class="constellation-line" x1="20" y1="20" x2="23" y2="19"></line>
        <line class="constellation-line" x1="23" y1="19" x2="25" y2="22"></line>
        <line class="constellation-line" x1="25" y1="22" x2="21" y2="24"></line>
        <line class="constellation-line" x1="21" y1="24" x2="19" y2="22"></line>
        <line class="constellation-line" x1="22.5" y1="21" x2="24.5" y2="24.5"></line>
        <circle class="constellation-star" cx="20" cy="20" r="0.3"></circle>
        <circle class="constellation-star" cx="23" cy="19" r="0.3"></circle>
        <circle class="constellation-star" cx="25" cy="22" r="0.3"></circle>
        <circle class="constellation-star" cx="21" cy="24" r="0.3"></circle>
        <circle class="constellation-star" cx="19" cy="22" r="0.3"></circle>
        <circle class="constellation-star" cx="22.5" cy="21" r="0.3"></circle>
        <circle class="constellation-star" cx="24.5" cy="24.5" r="0.3"></circle>

        <!-- Taurus -->
        <line class="constellation-line" x1="34" y1="34" x2="39" y2="31"></line>
        <line class="constellation-line" x1="39" y1="31" x2="44" y2="35"></line>
        <line class="constellation-line" x1="39" y1="31" x2="39" y2="41"></line>
        <line class="constellation-line" x1="39" y1="41" x2="34" y2="46"></line>
        <line class="constellation-line" x1="39" y1="41" x2="44" y2="46"></line>
        <circle class="constellation-star" cx="34" cy="34" r="0.35"></circle>
        <circle class="constellation-star" cx="39" cy="31" r="0.4"></circle>
        <circle class="constellation-star" cx="44" cy="35" r="0.35"></circle>
        <circle class="constellation-star" cx="39" cy="41" r="0.33"></circle>
        <circle class="constellation-star" cx="34" cy="46" r="0.3"></circle>
        <circle class="constellation-star" cx="44" cy="46" r="0.3"></circle>

        <!-- The Plough -->
        <line class="constellation-line" x1="12" y1="63" x2="18" y2="60"></line>
        <line class="constellation-line" x1="18" y1="60" x2="25" y2="61"></line>
        <line class="constellation-line" x1="25" y1="61" x2="30" y2="66"></line>
        <line class="constellation-line" x1="30" y1="66" x2="35" y2="72"></line>
        <line class="constellation-line" x1="35" y1="72" x2="40" y2="78"></line>
        <line class="constellation-line" x1="40" y1="78" x2="46" y2="84"></line>
        <circle class="constellation-star" cx="12" cy="63" r="0.35"></circle>
        <circle class="constellation-star" cx="18" cy="60" r="0.34"></circle>
        <circle class="constellation-star" cx="25" cy="61" r="0.34"></circle>
        <circle class="constellation-star" cx="30" cy="66" r="0.34"></circle>
        <circle class="constellation-star" cx="35" cy="72" r="0.34"></circle>
        <circle class="constellation-star" cx="40" cy="78" r="0.34"></circle>
        <circle class="constellation-star" cx="46" cy="84" r="0.34"></circle>
      </svg>
    </div>
    <div id="container">

      <canvas id="diamond-canvas"></canvas>

      <code-behind aria-label="Codebehind">
        <span class="saturn-orbit"><span id="C">C</span> <span id="o">o</span></span> <span id="d">d</span> <span id="e">e</span> <span id="b">b</span> <span id="e">e</span>
        <span class='fade-out' id="h">h</span> <span id="i">ı</span> <span id="dot" role="img" aria-label="quasar black hole"><span class="quasar-ring"></span><span class="quasar-core"></span></span> <span id="n">n</span> <span id="end">d</span>
      </code-behind>

    </div>

    <button id="pacman-trigger" type="button" aria-label="Open chat console"></button>

    <div id="chat-modal" role="dialog" aria-modal="true" aria-labelledby="chat-title">
      <div id="chat-window">
        <div id="chat-header">
          <span id="chat-title">WOPR: JOSHUA TERMINAL</span>
          <button id="chat-close" type="button" aria-label="Close chat">X</button>
        </div>
        <ul id="chat-log" aria-live="polite">
          <li>&gt; GREETINGS PROFESSOR FALKEN. SHALL WE PLAY A GAME?</li>
        </ul>
        <form id="chat-form">
          <input id="chat-input" type="text" autocomplete="off" placeholder="TYPE COMMAND..." aria-label="Chat command input" />
          <button id="chat-send" type="submit">SEND</button>
        </form>
      </div>
    </div>

    <script type="module" src="spacecraft-module.js"></script>
    <script src="spacecraft-interactions.js"></script>
  </body>
</html>
