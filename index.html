<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" href="favicon.svg" type="image/x-icon">
    <title>codebehind </title>
    <script src='codebehind.js' defer></script>
    <script>
      try {
        CSS.registerProperty({
          name: '--bg-color',
          syntax: '<color>',
          inherits: false,
          initialValue: '#020617'
        });
      } catch(e) {}
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        --bg-color: #020617;
        background: linear-gradient(var(--bg-color), #0a1628);
        transition: --bg-color 8s;
        overflow: hidden;
        /* Trigger bg transition on touch via JS-added class instead of :hover */
      }
      body.touched {
        --bg-color: #020f2e;
      }

      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
        cursor: default;
        /* Prevent callout/highlight on long-press on mobile */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #diamond-canvas {
        /* Larger on portrait mobile, capped on desktop */
        width: min(70vmin, 340px);
        height: min(70vmin, 340px);
        display: block;
        flex-shrink: 0;
        touch-action: none; /* prevent scroll-hijack on canvas */
      }

      code-behind {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        color: #7dd3fc;
        font: bold calc(1.4rem + 3vw) 'Raleway', sans-serif;
        text-shadow: #22d3ee 1px 0 14px;
        margin-top: -0.5rem;
      }

      span {
        padding: 4px;
      }

      #C {
        scale: 300%;
        color: #bae6fd;
        transform: translate(5px, -2px);
        text-shadow: #38bdf8 1px 0 18px;
      }

      #o {
        transform: translate(-18px, -10px);
        animation: 10s infinite alternate small-o,
                   15s infinite alternate small-d,
                   10s infinite alternate small-b;
      }
      @keyframes small-o {
        0%  { transform: translate(-18px, -10px); }
        50% { transform: translate(-24px, -10px); }
      }

      #d {
        transform: translate(0px, 1px);
        animation: 14s infinite alternate small-d;
      }
      @keyframes small-d {
        0%  { color: #7dd3fc; }
        50% { color: #22d3ee; }
      }

      #b {
        animation: 7s infinite alternate small-b;
        color: #7dd3fc;
        transform: translate(0px, 4px);
      }
      @keyframes small-b {
        0%   { scale: 100%; transform: translate(0px, 2px); }
        50%  { scale: 112%; transform: translate(0px, 4px); }
      }

      #e { transform: rotate(3deg); }

      .fade-in {
        display: block;
        animation: fade-in 3s ease-in forwards;
      }
      @keyframes fade-in {
        0%   { opacity: 0.5; }
        100% { opacity: 1; }
      }
      .fade-out {
        display: block;
        animation: fade-out 3s ease-out forwards;
      }
      @keyframes fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0.5; }
      }

      /* #h needs a larger touch target on mobile */
      #h {
        position: relative;
        cursor: pointer;
        padding: 8px;
        /* Explicit base values so CSS transitions have a start point */
        color: #7dd3fc;
        text-shadow: #22d3ee 1px 0 14px;
      }

      /* Bright-flash state: intense white/cyan glow */
      #h.bright {
        color: #ffffff;
        text-shadow:
          0 0 10px #ffffff,
          0 0 30px #ffffff,
          0 0 60px #bae6fd,
          0 0 100px #7dd3fc,
          0 0 160px #22d3ee;
      }

      #dot {
        transform: translate(-52px, -40px);
        color: #38bdf8;
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* dot-rotate triggered by JS class instead of :hover */
      #dot.spinning {
        animation: 1000s infinite alternate dot-rotate;
      }
      @keyframes dot-rotate {
        from { transform: translate(-52px, -40px) rotate(0deg); }
        to   { transform: translate(-52px, -42px) rotate(600000deg); }
      }

      #n   { transform: translate(-62px, 2px); }

      #end {
        transform: translate(-60px, 2px);
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* end-d triggered by JS class instead of :hover */
      #end.wobbling {
        animation: 4s alternate end-d;
      }
      @keyframes end-d {
        0%  { transform: translate(-60px, 2px) rotate(0deg); }
        50% { transform: translate(-65px, 0px) rotate(-20deg); }
      }
    </style>
  </head>
  <body>
    <div id="container">

      <canvas id="diamond-canvas"></canvas>

      <code-behind>
        <span id="C">C</span> <span id="o">o</span> <span id="d">d</span> <span id="e">e</span> <span id="b">b</span> <span id="e">e</span>
        <span class='fade-out' id="h">h</span> <span id="i">ı</span> <span id="dot">✺</span> <span id="n">n</span> <span id="end">d</span>
      </code-behind>

    </div>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

      const canvas = document.getElementById('diamond-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap at 2x for perf

      function resizeRenderer() {
        // Re-read clientWidth/Height after layout — avoids the 0x0 bug on mobile
        const w = canvas.clientWidth  || canvas.offsetWidth  || 300;
        const h = canvas.clientHeight || canvas.offsetHeight || 300;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      camera.position.z = 3;

      const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x0ea5e9,
        roughness: 0.15,
        metalness: 0.9
      });

      const wireMaterial = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        wireframe: true,
        transparent: true,
        opacity: 0.9
      });

      // Build an Elite-inspired "Raptor Mk I" spaceship from Three.js primitives.
      // The design echoes the angular, flat-shaded polygon aesthetic of classic Elite
      // ships (Cobra, Asp, Sidewinder) — elongated hull, swept wings, twin engine pods.
      function buildShip(mat) {
        const group = new THREE.Group();

        // Main hull: flat octahedron stretched along Z — produces an angular
        // arrowhead/diamond silhouette from above (8 flat triangular faces).
        const hullGeo = new THREE.OctahedronGeometry(0.72);
        hullGeo.applyMatrix4(new THREE.Matrix4().makeScale(1.0, 0.28, 1.9));
        group.add(new THREE.Mesh(hullGeo, mat));

        // Swept wings: thin boxes angled 14° back from the mid-fuselage.
        const portWingGeo = new THREE.BoxGeometry(0.85, 0.06, 0.75);
        const portWing = new THREE.Mesh(portWingGeo, mat);
        portWing.position.set(-0.72, 0, 0.1);
        portWing.rotation.y = 0.25;
        group.add(portWing);

        const stbdWingGeo = new THREE.BoxGeometry(0.85, 0.06, 0.75);
        const stbdWing = new THREE.Mesh(stbdWingGeo, mat);
        stbdWing.position.set(0.72, 0, 0.1);
        stbdWing.rotation.y = -0.25;
        group.add(stbdWing);

        // Wing-mounted lasers.
        const portLaserGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.55, 6);
        portLaserGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
        const portLaser = new THREE.Mesh(portLaserGeo, mat);
        portLaser.position.set(-1.12, 0.01, -0.2);
        portLaser.rotation.y = 0.25;
        group.add(portLaser);

        const stbdLaserGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.55, 6);
        stbdLaserGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
        const stbdLaser = new THREE.Mesh(stbdLaserGeo, mat);
        stbdLaser.position.set(1.12, 0.01, -0.2);
        stbdLaser.rotation.y = -0.25;
        group.add(stbdLaser);

        // Twin engine nacelles: hexagonal cylinders at the rear flanks.
        const portPodGeo = new THREE.CylinderGeometry(0.09, 0.14, 0.55, 6);
        portPodGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
        const portPod = new THREE.Mesh(portPodGeo, mat);
        portPod.position.set(-0.58, 0, 0.72);
        group.add(portPod);

        const stbdPodGeo = new THREE.CylinderGeometry(0.09, 0.14, 0.55, 6);
        stbdPodGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(Math.PI / 2));
        const stbdPod = new THREE.Mesh(stbdPodGeo, mat);
        stbdPod.position.set(0.58, 0, 0.72);
        group.add(stbdPod);

        return group;
      }

      const diamond = buildShip(solidMaterial);
      scene.add(diamond);

      const wireframe = buildShip(wireMaterial);
      wireframe.scale.setScalar(1.01);
      scene.add(wireframe);

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);
      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(5, 5, 5);
      scene.add(light);

      // Store base intensities for the h-brightness effect
      const ambientBaseIntensity = 0.4;
      const lightBaseIntensity   = 1.2;

      // Touch-drag to spin the diamond
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let velX = 0.015, velY = 0.01; // default auto-spin velocity

      canvas.addEventListener('touchstart', e => {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        velX = dx * 0.005;
        velY = dy * 0.005;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', () => { isDragging = false; });

      // Mouse drag too (bonus)
      canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
      canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        velX = (e.clientX - lastX) * 0.005;
        velY = (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
      });
      canvas.addEventListener('mouseup', () => { isDragging = false; });

      function animate() {
        // Gradually drift back to gentle auto-spin when not dragging
        if (!isDragging) {
          velX += (0.015 - velX) * 0.02;
          velY += (0.010 - velY) * 0.02;
        }
        diamond.rotation.y += velX;
        diamond.rotation.x += velY;
        wireframe.rotation.copy(diamond.rotation);

        // h-brightness: ramp scene lighting up then back down over ~10 s
        // Timing in milliseconds: rise=400 ms, hold=8 s, fade=2 s
        const H_RISE = 400, H_HOLD = 8000, H_FADE = 2000;
        // window._hPressTime is set by the non-module event-handler script below;
        // window is the only shared scope between a <script type="module"> and a plain <script>.
        const hElapsed = window._hPressTime ? Date.now() - window._hPressTime : Infinity;
        let hBrightness = 0;
        if (hElapsed < H_RISE) {
          hBrightness = hElapsed / H_RISE;
        } else if (hElapsed < H_HOLD) {
          hBrightness = 1;
        } else if (hElapsed < H_HOLD + H_FADE) {
          hBrightness = 1 - (hElapsed - H_HOLD) / H_FADE;
        }
        light.intensity   = lightBaseIntensity   + hBrightness * 10;
        ambient.intensity = ambientBaseIntensity  + hBrightness * 3;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      // Wait one frame for layout, then init size and start
      requestAnimationFrame(() => {
        resizeRenderer();
        animate();
      });

      window.addEventListener('resize', resizeRenderer);
      // Also handle orientation change on mobile
      window.addEventListener('orientationchange', () => setTimeout(resizeRenderer, 200));
    </script>

    <script>
      (() => {
        // --- Background touch: toggle .touched on body ---
        let touchTimer = null;
        document.getElementById('container').addEventListener('touchstart', () => {
          touchTimer = setTimeout(() => {
            document.body.classList.toggle('touched');
          }, 150);
        });
        document.getElementById('container').addEventListener('touchend', () => {
          clearTimeout(touchTimer);
        });
        // Keep hover working on desktop
        document.body.addEventListener('mouseenter', () => document.body.classList.add('touched'));
        document.body.addEventListener('mouseleave', () => document.body.classList.remove('touched'));

        // --- Title ticker ---
        let title = '♥︎✵☺︎☕︎♘⦿☆☽⚀⛵︎⚽︎☯︎';
        const aceOfSpades = '🂡';
        setInterval(() => {
          title = title.substring(1) + title[0];
          document.title = aceOfSpades + title;
        }, 500);

        // --- #h: click/tap to toggle fade and trigger brightness flash ---
        const h_elem = document.getElementById('h');

        // Bright flash: quick rise (0.4 s = H_RISE/1000), hold (~8 s = H_HOLD/1000),
        // slow fade (2 s = H_FADE/1000) ≈ 10 s total.
        // The duration strings below must stay in sync with H_RISE / H_FADE in the
        // module script above (cross-script constants can't be shared directly).
        let _hBrightTimer = null;
        function triggerBright() {
          if (_hBrightTimer) { clearTimeout(_hBrightTimer); _hBrightTimer = null; }
          h_elem.style.transition = 'color 0.4s ease-in, text-shadow 0.4s ease-in';   // H_RISE
          h_elem.classList.add('bright');
          window._hPressTime = Date.now();
          _hBrightTimer = setTimeout(() => {
            h_elem.style.transition = 'color 2s ease-out, text-shadow 2s ease-out';   // H_FADE
            h_elem.classList.remove('bright');
            _hBrightTimer = null;
          }, 8000); // H_HOLD
        }

        function toggleH() {
          triggerBright();
          if (h_elem.classList.contains('fade-in')) {
            h_elem.classList.replace('fade-in', 'fade-out');
          } else {
            h_elem.classList.replace('fade-out', 'fade-in');
          }
        }
        h_elem.addEventListener('click', toggleH);
        h_elem.addEventListener('touchend', e => { e.preventDefault(); toggleH(); });

        // --- #dot: tap/click to toggle spin ---
        const dot = document.getElementById('dot');
        function toggleDot() {
          dot.classList.toggle('spinning');
        }
        dot.addEventListener('click', toggleDot);
        dot.addEventListener('touchend', e => { e.preventDefault(); toggleDot(); });

        // --- #end: tap/click to trigger wobble ---
        const end = document.getElementById('end');
        function triggerEnd() {
          end.classList.remove('wobbling');
          // Force reflow so animation restarts
          void end.offsetWidth;
          end.classList.add('wobbling');
        }
        end.addEventListener('click', triggerEnd);
        end.addEventListener('touchend', e => { e.preventDefault(); triggerEnd(); });
        end.addEventListener('animationend', () => end.classList.remove('wobbling'));
      })();
    </script>
  </body>
</html>
