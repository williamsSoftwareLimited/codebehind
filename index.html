<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" href="favicon.svg" type="image/x-icon">
    <title>codebehind </title>
    <script src='codebehind.js' defer></script>
    <script>
      try {
        CSS.registerProperty({
          name: '--bg-color',
          syntax: '<color>',
          inherits: false,
          initialValue: '#020617'
        });
      } catch(e) {}
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        --bg-color: #020617;
        background: linear-gradient(var(--bg-color), #0a1628);
        transition: --bg-color 8s;
        overflow: hidden;
        position: relative;
        /* Trigger bg transition on touch via JS-added class instead of :hover */
      }
      body.touched {
        --bg-color: #020f2e;
      }

      #starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      #stars {
        position: absolute;
        inset: 0;
      }

      .star {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #c7edff 45%, rgba(199, 237, 255, 0) 100%);
        animation-name: wink;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      @keyframes wink {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }

      #constellations {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .constellation-line {
        stroke: rgba(173, 216, 255, 0.45);
        stroke-width: 0.2;
      }

      .constellation-star {
        fill: #dff4ff;
        filter: drop-shadow(0 0 3px #9ed9ff);
      }

      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
        cursor: default;
        /* Prevent callout/highlight on long-press on mobile */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        position: relative;
        z-index: 1;
      }

      #diamond-canvas {
        /* Larger on portrait mobile, capped on desktop */
        width: min(70vmin, 340px);
        height: min(70vmin, 340px);
        display: block;
        flex-shrink: 0;
        touch-action: none; /* prevent scroll-hijack on canvas */
      }

      code-behind {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        color: #7dd3fc;
        font: bold calc(1.4rem + 3vw) 'Raleway', sans-serif;
        text-shadow: #22d3ee 1px 0 14px;
        margin-top: -0.5rem;
      }

      span {
        padding: 4px;
      }

      #C {
        scale: 300%;
        color: #bae6fd;
        transform: translate(5px, -2px);
        text-shadow: #38bdf8 1px 0 18px;
      }

      #o {
        transform: translate(-18px, -10px);
        animation: 10s infinite alternate small-o,
                   15s infinite alternate small-d,
                   10s infinite alternate small-b;
      }
      @keyframes small-o {
        0%  { transform: translate(-18px, -10px); }
        50% { transform: translate(-24px, -10px); }
      }

      #d {
        transform: translate(0px, 1px);
        animation: 14s infinite alternate small-d;
      }
      @keyframes small-d {
        0%  { color: #7dd3fc; }
        50% { color: #22d3ee; }
      }

      #b {
        animation: 7s infinite alternate small-b;
        color: #7dd3fc;
        transform: translate(0px, 4px);
      }
      @keyframes small-b {
        0%   { scale: 100%; transform: translate(0px, 2px); }
        50%  { scale: 112%; transform: translate(0px, 4px); }
      }

      #e { transform: rotate(3deg); }

      .fade-in {
        display: block;
        animation: fade-in 3s ease-in forwards;
      }
      @keyframes fade-in {
        0%   { opacity: 0.5; }
        100% { opacity: 1; }
      }
      .fade-out {
        display: block;
        animation: fade-out 3s ease-out forwards;
      }
      @keyframes fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0.5; }
      }

      /* #h needs a larger touch target on mobile */
      #h {
        position: relative;
        cursor: pointer;
        padding: 8px;
        /* Explicit base values so CSS transitions have a start point */
        color: #7dd3fc;
        text-shadow: #22d3ee 1px 0 14px;
      }

      /* Bright-flash state: intense white/cyan glow */
      #h.bright {
        color: #ffffff;
        text-shadow:
          0 0 10px #ffffff,
          0 0 30px #ffffff,
          0 0 60px #bae6fd,
          0 0 100px #7dd3fc,
          0 0 160px #22d3ee;
      }

      #dot {
        transform: translate(-52px, -40px);
        color: #38bdf8;
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* dot-rotate triggered by JS class instead of :hover */
      #dot.spinning {
        animation: 1000s infinite alternate dot-rotate;
      }
      @keyframes dot-rotate {
        from { transform: translate(-52px, -40px) rotate(0deg); }
        to   { transform: translate(-52px, -42px) rotate(600000deg); }
      }

      #n   { transform: translate(-62px, 2px); }

      #end {
        transform: translate(-60px, 2px);
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* end-d triggered by JS class instead of :hover */
      #end.wobbling {
        animation: 4s alternate end-d;
      }
      @keyframes end-d {
        0%  { transform: translate(-60px, 2px) rotate(0deg); }
        50% { transform: translate(-65px, 0px) rotate(-20deg); }
      }

      /* Mobile fallback font can compress ı width, so n visually overlaps it */
      @media (max-width: 768px) {
        #i {
          display: inline-block;
          padding-right: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="starfield" aria-hidden="true">
      <div id="stars"></div>
      <svg id="constellations" viewBox="0 0 100 100" preserveAspectRatio="none">
        <!-- Orion -->
        <line class="constellation-line" x1="68" y1="12" x2="63" y2="24"></line>
        <line class="constellation-line" x1="63" y1="24" x2="67" y2="33"></line>
        <line class="constellation-line" x1="67" y1="33" x2="61" y2="46"></line>
        <line class="constellation-line" x1="61" y1="46" x2="70" y2="52"></line>
        <line class="constellation-line" x1="64" y1="28" x2="66" y2="31"></line>
        <line class="constellation-line" x1="66" y1="31" x2="68" y2="34"></line>
        <circle class="constellation-star" cx="68" cy="12" r="0.45"></circle>
        <circle class="constellation-star" cx="63" cy="24" r="0.4"></circle>
        <circle class="constellation-star" cx="67" cy="33" r="0.38"></circle>
        <circle class="constellation-star" cx="61" cy="46" r="0.35"></circle>
        <circle class="constellation-star" cx="70" cy="52" r="0.35"></circle>
        <circle class="constellation-star" cx="64" cy="28" r="0.27"></circle>
        <circle class="constellation-star" cx="66" cy="31" r="0.27"></circle>
        <circle class="constellation-star" cx="68" cy="34" r="0.27"></circle>

        <!-- Seven Sisters (Pleiades) -->
        <line class="constellation-line" x1="20" y1="20" x2="23" y2="19"></line>
        <line class="constellation-line" x1="23" y1="19" x2="25" y2="22"></line>
        <line class="constellation-line" x1="25" y1="22" x2="21" y2="24"></line>
        <line class="constellation-line" x1="21" y1="24" x2="19" y2="22"></line>
        <line class="constellation-line" x1="22.5" y1="21" x2="24.5" y2="24.5"></line>
        <circle class="constellation-star" cx="20" cy="20" r="0.3"></circle>
        <circle class="constellation-star" cx="23" cy="19" r="0.3"></circle>
        <circle class="constellation-star" cx="25" cy="22" r="0.3"></circle>
        <circle class="constellation-star" cx="21" cy="24" r="0.3"></circle>
        <circle class="constellation-star" cx="19" cy="22" r="0.3"></circle>
        <circle class="constellation-star" cx="22.5" cy="21" r="0.3"></circle>
        <circle class="constellation-star" cx="24.5" cy="24.5" r="0.3"></circle>

        <!-- Taurus -->
        <line class="constellation-line" x1="34" y1="34" x2="39" y2="31"></line>
        <line class="constellation-line" x1="39" y1="31" x2="44" y2="35"></line>
        <line class="constellation-line" x1="39" y1="31" x2="39" y2="41"></line>
        <line class="constellation-line" x1="39" y1="41" x2="34" y2="46"></line>
        <line class="constellation-line" x1="39" y1="41" x2="44" y2="46"></line>
        <circle class="constellation-star" cx="34" cy="34" r="0.35"></circle>
        <circle class="constellation-star" cx="39" cy="31" r="0.4"></circle>
        <circle class="constellation-star" cx="44" cy="35" r="0.35"></circle>
        <circle class="constellation-star" cx="39" cy="41" r="0.33"></circle>
        <circle class="constellation-star" cx="34" cy="46" r="0.3"></circle>
        <circle class="constellation-star" cx="44" cy="46" r="0.3"></circle>

        <!-- The Plough -->
        <line class="constellation-line" x1="12" y1="63" x2="18" y2="60"></line>
        <line class="constellation-line" x1="18" y1="60" x2="25" y2="61"></line>
        <line class="constellation-line" x1="25" y1="61" x2="30" y2="66"></line>
        <line class="constellation-line" x1="30" y1="66" x2="35" y2="72"></line>
        <line class="constellation-line" x1="35" y1="72" x2="40" y2="78"></line>
        <line class="constellation-line" x1="40" y1="78" x2="46" y2="84"></line>
        <circle class="constellation-star" cx="12" cy="63" r="0.35"></circle>
        <circle class="constellation-star" cx="18" cy="60" r="0.34"></circle>
        <circle class="constellation-star" cx="25" cy="61" r="0.34"></circle>
        <circle class="constellation-star" cx="30" cy="66" r="0.34"></circle>
        <circle class="constellation-star" cx="35" cy="72" r="0.34"></circle>
        <circle class="constellation-star" cx="40" cy="78" r="0.34"></circle>
        <circle class="constellation-star" cx="46" cy="84" r="0.34"></circle>
      </svg>
    </div>
    <div id="container">

      <canvas id="diamond-canvas"></canvas>

      <code-behind>
        <span id="C">C</span> <span id="o">o</span> <span id="d">d</span> <span id="e">e</span> <span id="b">b</span> <span id="e">e</span>
        <span class='fade-out' id="h">h</span> <span id="i">ı</span> <span id="dot">✺</span> <span id="n">n</span> <span id="end">d</span>
      </code-behind>

    </div>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

      const canvas = document.getElementById('diamond-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap at 2x for perf

      function resizeRenderer() {
        // Re-read clientWidth/Height after layout — avoids the 0x0 bug on mobile
        const w = canvas.clientWidth  || canvas.offsetWidth  || 300;
        const h = canvas.clientHeight || canvas.offsetHeight || 300;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      camera.position.z = 3;

      const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x0ea5e9,
        roughness: 0.15,
        metalness: 0.9
      });
      const solidRingMaterial = new THREE.MeshStandardMaterial({
        color: 0x7dd3fc,
        roughness: 0.35,
        metalness: 0.25,
        side: THREE.DoubleSide
      });

      const wireMaterial = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        wireframe: true,
        transparent: true,
        opacity: 0.9
      });
      const wireRingMaterial = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        wireframe: true,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      });

      function buildSaturn(planetMat, ringMat) {
        const group = new THREE.Group();

        const planetGeo = new THREE.SphereGeometry(0.62, 32, 32);
        const planet = new THREE.Mesh(planetGeo, planetMat);
        group.add(planet);

        const ringGeo = new THREE.RingGeometry(0.86, 1.33, 72);
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.35;
        group.add(ring);

        group.rotation.z = -0.45;

        return group;
      }

      const saturn = buildSaturn(solidMaterial, solidRingMaterial);
      scene.add(saturn);

      const saturnWireframe = buildSaturn(wireMaterial, wireRingMaterial);
      saturnWireframe.scale.setScalar(1.01);
      scene.add(saturnWireframe);

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);
      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(5, 5, 5);
      scene.add(light);

      // Store base intensities for the h-brightness effect
      const ambientBaseIntensity = 0.4;
      const lightBaseIntensity   = 1.2;

      // Touch-drag to spin Saturn
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let velX = 0.015, velY = 0.01; // default auto-spin velocity

      canvas.addEventListener('touchstart', e => {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        velX = dx * 0.005;
        velY = dy * 0.005;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', () => { isDragging = false; });

      // Mouse drag too (bonus)
      canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
      canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        velX = (e.clientX - lastX) * 0.005;
        velY = (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
      });
      canvas.addEventListener('mouseup', () => { isDragging = false; });

      function animate() {
        // Gradually drift back to gentle auto-spin when not dragging
        if (!isDragging) {
          velX += (0.015 - velX) * 0.02;
          velY += (0.010 - velY) * 0.02;
        }
        saturn.rotation.y += velX;
        saturn.rotation.x += velY;
        saturnWireframe.rotation.copy(saturn.rotation);

        // h-brightness: ramp scene lighting up then back down over ~10 s
        // Timing in milliseconds: rise=400 ms, hold=8 s, fade=2 s
        const H_RISE = 400, H_HOLD = 8000, H_FADE = 2000;
        // window._hPressTime is set by the non-module event-handler script below;
        // window is the only shared scope between a <script type="module"> and a plain <script>.
        const hElapsed = window._hPressTime ? Date.now() - window._hPressTime : Infinity;
        let hBrightness = 0;
        if (hElapsed < H_RISE) {
          hBrightness = hElapsed / H_RISE;
        } else if (hElapsed < H_HOLD) {
          hBrightness = 1;
        } else if (hElapsed < H_HOLD + H_FADE) {
          hBrightness = 1 - (hElapsed - H_HOLD) / H_FADE;
        }
        light.intensity   = lightBaseIntensity   + hBrightness * 10;
        ambient.intensity = ambientBaseIntensity  + hBrightness * 3;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      // Wait one frame for layout, then init size and start
      requestAnimationFrame(() => {
        resizeRenderer();
        animate();
      });

      window.addEventListener('resize', resizeRenderer);
      // Also handle orientation change on mobile
      window.addEventListener('orientationchange', () => setTimeout(resizeRenderer, 200));
    </script>

    <script>
      (() => {
        // --- Background stars ---
        const starsLayer = document.getElementById('stars');
        const starCount = 160;
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('span');
          star.className = 'star';
          const size = Math.random() * 2.4 + 0.7;
          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.left = `${Math.random() * 100}%`;
          star.style.top = `${Math.random() * 100}%`;
          star.style.animationDuration = `${2.2 + Math.random() * 4.8}s`;
          star.style.animationDelay = `${Math.random() * 5}s`;
          starsLayer.appendChild(star);
        }

        // --- Background touch: toggle .touched on body ---
        let touchTimer = null;
        document.getElementById('container').addEventListener('touchstart', () => {
          touchTimer = setTimeout(() => {
            document.body.classList.toggle('touched');
          }, 150);
        });
        document.getElementById('container').addEventListener('touchend', () => {
          clearTimeout(touchTimer);
        });
        // Keep hover working on desktop
        document.body.addEventListener('mouseenter', () => document.body.classList.add('touched'));
        document.body.addEventListener('mouseleave', () => document.body.classList.remove('touched'));

        // --- Title ticker ---
        let title = '♥︎✵☺︎☕︎♘⦿☆☽⚀⛵︎⚽︎☯︎';
        const aceOfSpades = '🂡';
        setInterval(() => {
          title = title.substring(1) + title[0];
          document.title = aceOfSpades + title;
        }, 500);

        // --- #h: click/tap to toggle fade and trigger brightness flash ---
        const h_elem = document.getElementById('h');

        // Bright flash: quick rise (0.4 s = H_RISE/1000), hold (~8 s = H_HOLD/1000),
        // slow fade (2 s = H_FADE/1000) ≈ 10 s total.
        // The duration strings below must stay in sync with H_RISE / H_FADE in the
        // module script above (cross-script constants can't be shared directly).
        let _hBrightTimer = null;
        function triggerBright() {
          if (_hBrightTimer) { clearTimeout(_hBrightTimer); _hBrightTimer = null; }
          h_elem.style.transition = 'color 0.4s ease-in, text-shadow 0.4s ease-in';   // H_RISE
          h_elem.classList.add('bright');
          window._hPressTime = Date.now();
          _hBrightTimer = setTimeout(() => {
            h_elem.style.transition = 'color 2s ease-out, text-shadow 2s ease-out';   // H_FADE
            h_elem.classList.remove('bright');
            _hBrightTimer = null;
          }, 8000); // H_HOLD
        }

        function toggleH() {
          triggerBright();
          if (h_elem.classList.contains('fade-in')) {
            h_elem.classList.replace('fade-in', 'fade-out');
          } else {
            h_elem.classList.replace('fade-out', 'fade-in');
          }
        }
        h_elem.addEventListener('click', toggleH);
        h_elem.addEventListener('touchend', e => { e.preventDefault(); toggleH(); });

        // --- #dot: tap/click to toggle spin ---
        const dot = document.getElementById('dot');
        function toggleDot() {
          dot.classList.toggle('spinning');
        }
        dot.addEventListener('click', toggleDot);
        dot.addEventListener('touchend', e => { e.preventDefault(); toggleDot(); });

        // --- #end: tap/click to trigger wobble ---
        const end = document.getElementById('end');
        function triggerEnd() {
          end.classList.remove('wobbling');
          // Force reflow so animation restarts
          void end.offsetWidth;
          end.classList.add('wobbling');
        }
        end.addEventListener('click', triggerEnd);
        end.addEventListener('touchend', e => { e.preventDefault(); triggerEnd(); });
        end.addEventListener('animationend', () => end.classList.remove('wobbling'));
      })();
    </script>
  </body>
</html>
