<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <link rel="icon" href="favicon.svg" type="image/x-icon">
    <title>codebehind </title>
    <script src='codebehind.js' defer></script>
    <script>
      try {
        CSS.registerProperty({
          name: '--bg-color',
          syntax: '<color>',
          inherits: false,
          initialValue: '#020617'
        });
      } catch(e) {}
    </script>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        --bg-color: #020617;
        background: linear-gradient(var(--bg-color), #0a1628);
        transition: --bg-color 8s;
        overflow: hidden;
        position: relative;
        /* Trigger bg transition on touch via JS-added class instead of :hover */
      }
      body.touched {
        --bg-color: #020f2e;
      }

      #starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      #stars {
        position: absolute;
        inset: 0;
      }

      .star {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(circle, #ffffff 0%, #c7edff 45%, rgba(199, 237, 255, 0) 100%);
        animation-name: wink;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      @keyframes wink {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }

      #constellations {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .constellation-line {
        stroke: rgba(173, 216, 255, 0.45);
        stroke-width: 0.2;
      }

      .constellation-star {
        fill: #dff4ff;
        filter: drop-shadow(0 0 3px #9ed9ff);
      }

      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 0;
        cursor: default;
        /* Prevent callout/highlight on long-press on mobile */
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        position: relative;
        z-index: 1;
      }

      #diamond-canvas {
        /* Larger on portrait mobile, capped on desktop */
        width: min(70vmin, 340px);
        height: min(70vmin, 340px);
        display: block;
        flex-shrink: 0;
        touch-action: none; /* prevent scroll-hijack on canvas */
      }

      code-behind {
        display: flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        color: #7dd3fc;
        font: bold calc(1.4rem + 3vw) 'Raleway', sans-serif;
        text-shadow: #22d3ee 1px 0 14px;
        margin-top: -0.5rem;
      }

      span {
        padding: 4px;
      }

      #C {
        scale: 300%;
        color: #bae6fd;
        transform: translate(5px, -2px);
        text-shadow: #38bdf8 1px 0 18px;
      }

      .saturn-orbit {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding-right: 0.45em;
      }

      #o {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1.05em;
        height: 1.05em;
        transform: translate(-50%, -50%) rotate(0deg) translateX(28px) rotate(0deg);
        animation: 6.5s linear infinite orbit-c;
        color: transparent;
        pointer-events: none;
      }
      #o::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0.52em;
        height: 0.52em;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #d9f2ff 0%, #7dd3fc 55%, #0ea5e9 100%);
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px #38bdf8;
      }
      #o::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0.95em;
        height: 0.38em;
        border: 2px solid rgba(186, 230, 253, 0.9);
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(-22deg);
        box-shadow: 0 0 8px rgba(34, 211, 238, 0.7);
      }
      @keyframes orbit-c {
        from { transform: translate(-50%, -50%) rotate(0deg) translateX(28px) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg) translateX(28px) rotate(-360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #o {
          animation: none;
          transform: translate(-50%, -50%) translateX(28px);
        }
      }

      #d {
        transform: translate(0px, 1px);
        animation: 14s infinite alternate small-d;
      }
      @keyframes small-d {
        0%  { color: #7dd3fc; }
        50% { color: #22d3ee; }
      }

      #b {
        animation: 7s infinite alternate small-b;
        color: #7dd3fc;
        transform: translate(0px, 4px);
      }
      @keyframes small-b {
        0%   { scale: 100%; transform: translate(0px, 2px); }
        50%  { scale: 112%; transform: translate(0px, 4px); }
      }

      #e { transform: rotate(3deg); }

      .fade-in {
        display: block;
        animation: fade-in 3s ease-in forwards;
      }
      @keyframes fade-in {
        0%   { opacity: 0.5; }
        100% { opacity: 1; }
      }
      .fade-out {
        display: block;
        animation: fade-out 3s ease-out forwards;
      }
      @keyframes fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0.5; }
      }

      /* #h needs a larger touch target on mobile */
      #h {
        position: relative;
        cursor: pointer;
        padding: 8px;
        /* Explicit base values so CSS transitions have a start point */
        color: #7dd3fc;
        text-shadow: #22d3ee 1px 0 14px;
      }

      /* Bright-flash state: intense white/cyan glow */
      #h.bright {
        color: #ffffff;
        text-shadow:
          0 0 10px #ffffff,
          0 0 30px #ffffff,
          0 0 60px #bae6fd,
          0 0 100px #7dd3fc,
          0 0 160px #22d3ee;
      }

      #dot {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 0.72em;
        height: 0.72em;
        transform: translate(-52px, -40px);
      }
      #dot .quasar-core {
        width: 56%;
        height: 56%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1f2937 0%, #06080c 52%, #000000 100%);
        box-shadow: 0 0 0.18em rgba(10, 10, 10, 0.95), 0 0 0.42em rgba(56, 189, 248, 0.18);
        z-index: 3;
      }
      #dot .quasar-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          rgba(56, 189, 248, 0.24) 0deg,
          rgba(30, 58, 138, 0.4) 110deg,
          rgba(12, 17, 28, 0.9) 220deg,
          rgba(56, 189, 248, 0.2) 360deg
        );
        filter: blur(0.4px);
        will-change: transform;
        animation: 26s linear infinite quasar-spin;
        z-index: 1;
      }
      @keyframes quasar-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      #n   { transform: translate(-42px, 4px); }

      #end {
        transform: translate(-60px, 2px);
        cursor: pointer;
        padding: 8px; /* larger touch target */
      }
      /* end-d triggered by JS class instead of :hover */
      #end.wobbling {
        animation: 4s alternate end-d;
      }
      @keyframes end-d {
        0%  { transform: translate(-60px, 2px) rotate(0deg); }
        50% { transform: translate(-65px, 0px) rotate(-20deg); }
      }

      #pacman-trigger {
        position: fixed;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 50px;
        height: 50px;
        border: 0;
        padding: 0;
        border-radius: 50%;
        background: #facc15;
        cursor: pointer;
        z-index: 6;
        box-shadow: 0 0 14px rgba(250, 204, 21, 0.7);
      }
      #pacman-trigger::before {
        content: '';
        position: absolute;
        inset: 0;
        background: #020617;
        clip-path: polygon(100% 50%, 58% 18%, 58% 82%);
      }
      #pacman-trigger::after {
        content: '';
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        top: 13px;
        left: 28px;
        background: #111827;
      }
      #pacman-trigger:hover::before,
      #pacman-trigger:focus-visible::before {
        animation: pacman-chomp 0.24s steps(1, end) infinite;
      }
      #pacman-trigger:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 3px;
      }
      @keyframes pacman-chomp {
        0%, 100% { clip-path: polygon(100% 50%, 58% 18%, 58% 82%); }
        50% { clip-path: polygon(100% 50%, 70% 44%, 70% 56%); }
      }

      #chat-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        z-index: 7;
      }
      #chat-modal.open {
        display: flex;
      }
      #chat-window {
        width: min(92vw, 620px);
        height: min(82vh, 460px);
        background: #050705;
        border: 2px solid #3aff7a;
        box-shadow: 0 0 28px rgba(58, 255, 122, 0.28);
        color: #6dff99;
        font-family: "Courier New", Courier, monospace;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      #chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #2ad060;
        padding: 10px 12px;
        letter-spacing: 0.06em;
      }
      #chat-close {
        border: 1px solid #2ad060;
        background: transparent;
        color: #6dff99;
        cursor: pointer;
        width: 28px;
        height: 28px;
      }
      #chat-log {
        margin: 0;
        list-style: none;
        padding: 12px;
        overflow: auto;
      }
      #chat-log li {
        margin-bottom: 8px;
        line-height: 1.35;
        word-break: break-word;
      }
      #chat-form {
        display: flex;
        gap: 8px;
        border-top: 1px solid #2ad060;
        padding: 10px;
      }
      #chat-input {
        flex: 1;
        min-width: 0;
        background: #010201;
        border: 1px solid #2ad060;
        color: #6dff99;
        padding: 8px;
        font: inherit;
      }
      #chat-send {
        border: 1px solid #2ad060;
        background: transparent;
        color: #6dff99;
        padding: 0 12px;
        cursor: pointer;
        font: inherit;
      }
    </style>
  </head>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

      const canvas = document.getElementById('diamond-canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // cap at 2x for perf

      function resizeRenderer() {
        // Re-read clientWidth/Height after layout — avoids the 0x0 bug on mobile
        const w = canvas.clientWidth  || canvas.offsetWidth  || 300;
        const h = canvas.clientHeight || canvas.offsetHeight || 300;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      camera.position.z = 3;

      const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x0ea5e9,
        roughness: 0.15,
        metalness: 0.9
      });
      const solidRingMaterial = new THREE.MeshStandardMaterial({
        color: 0x7dd3fc,
        roughness: 0.35,
        metalness: 0.25,
        side: THREE.DoubleSide
      });

      const wireMaterial = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        wireframe: true,
        transparent: true,
        opacity: 0.9
      });
      const wireRingMaterial = new THREE.MeshBasicMaterial({
        color: 0x22d3ee,
        wireframe: true,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      });

      function buildSaturn(planetMat, ringMat) {
        const group = new THREE.Group();

        const planetGeo = new THREE.SphereGeometry(0.62, 32, 32);
        const planet = new THREE.Mesh(planetGeo, planetMat);
        group.add(planet);

        const ringGeo = new THREE.RingGeometry(0.86, 1.33, 72);
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.35;
        group.add(ring);

        group.rotation.z = -0.45;

        return group;
      }

      const saturn = buildSaturn(solidMaterial, solidRingMaterial);
      scene.add(saturn);

      const saturnWireframe = buildSaturn(wireMaterial, wireRingMaterial);
      saturnWireframe.scale.setScalar(1.01);
      scene.add(saturnWireframe);

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);
      const light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(5, 5, 5);
      scene.add(light);

      // Store base intensities for the h-brightness effect
      const ambientBaseIntensity = 0.4;
      const lightBaseIntensity   = 1.2;

      // Touch-drag to spin Saturn
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let velX = 0.015, velY = 0.01; // default auto-spin velocity

      canvas.addEventListener('touchstart', e => {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        velX = dx * 0.005;
        velY = dy * 0.005;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', () => { isDragging = false; });

      // Mouse drag too (bonus)
      canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
      canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        velX = (e.clientX - lastX) * 0.005;
        velY = (e.clientY - lastY) * 0.005;
        lastX = e.clientX; lastY = e.clientY;
      });
      canvas.addEventListener('mouseup', () => { isDragging = false; });

      function animate() {
        // Gradually drift back to gentle auto-spin when not dragging
        if (!isDragging) {
          velX += (0.015 - velX) * 0.02;
          velY += (0.010 - velY) * 0.02;
        }
        saturn.rotation.y += velX;
        saturn.rotation.x += velY;
        saturnWireframe.rotation.copy(saturn.rotation);

        // h-brightness: ramp scene lighting up then back down over ~10 s
        // Timing in milliseconds: rise=400 ms, hold=8 s, fade=2 s
        const H_RISE = 400, H_HOLD = 8000, H_FADE = 2000;
        // window._hPressTime is set by the non-module event-handler script below;
        // window is the only shared scope between a <script type="module"> and a plain <script>.
        const hElapsed = window._hPressTime ? Date.now() - window._hPressTime : Infinity;
        let hBrightness = 0;
        if (hElapsed < H_RISE) {
          hBrightness = hElapsed / H_RISE;
        } else if (hElapsed < H_HOLD) {
          hBrightness = 1;
        } else if (hElapsed < H_HOLD + H_FADE) {
          hBrightness = 1 - (hElapsed - H_HOLD) / H_FADE;
        }
        light.intensity   = lightBaseIntensity   + hBrightness * 10;
        ambient.intensity = ambientBaseIntensity  + hBrightness * 3;

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      // Wait one frame for layout, then init size and start
      requestAnimationFrame(() => {
        resizeRenderer();
        animate();
      });

      window.addEventListener('resize', resizeRenderer);
      // Also handle orientation change on mobile
      window.addEventListener('orientationchange', () => setTimeout(resizeRenderer, 200));
    </script>

    <script>
      (() => {
        // --- Background stars ---
        const starsLayer = document.getElementById('stars');
        const starCount = 160;
        for (let i = 0; i < starCount; i++) {
          const star = document.createElement('span');
          star.className = 'star';
          const size = Math.random() * 2.4 + 0.7;
          star.style.width = `${size}px`;
          star.style.height = `${size}px`;
          star.style.left = `${Math.random() * 100}%`;
          star.style.top = `${Math.random() * 100}%`;
          star.style.animationDuration = `${2.2 + Math.random() * 4.8}s`;
          star.style.animationDelay = `${Math.random() * 5}s`;
          starsLayer.appendChild(star);
        }

        // --- Background touch: toggle .touched on body ---
        let touchTimer = null;
        document.getElementById('container').addEventListener('touchstart', () => {
          touchTimer = setTimeout(() => {
            document.body.classList.toggle('touched');
          }, 150);
        });
        document.getElementById('container').addEventListener('touchend', () => {
          clearTimeout(touchTimer);
        });
        // Keep hover working on desktop
        document.body.addEventListener('mouseenter', () => document.body.classList.add('touched'));
        document.body.addEventListener('mouseleave', () => document.body.classList.remove('touched'));

        // --- Title ticker ---
        let title = '♥︎✵☺︎☕︎♘⦿☆☽⚀⛵︎⚽︎☯︎';
        const aceOfSpades = '🂡';
        setInterval(() => {
          title = title.substring(1) + title[0];
          document.title = aceOfSpades + title;
        }, 500);

        // --- #h: click/tap to toggle fade and trigger brightness flash ---
        const h_elem = document.getElementById('h');

        // Bright flash: quick rise (0.4 s = H_RISE/1000), hold (~8 s = H_HOLD/1000),
        // slow fade (2 s = H_FADE/1000) ≈ 10 s total.
        // The duration strings below must stay in sync with H_RISE / H_FADE in the
        // module script above (cross-script constants can't be shared directly).
        let _hBrightTimer = null;
        function triggerBright() {
          if (_hBrightTimer) { clearTimeout(_hBrightTimer); _hBrightTimer = null; }
          h_elem.style.transition = 'color 0.4s ease-in, text-shadow 0.4s ease-in';   // H_RISE
          h_elem.classList.add('bright');
          window._hPressTime = Date.now();
          _hBrightTimer = setTimeout(() => {
            h_elem.style.transition = 'color 2s ease-out, text-shadow 2s ease-out';   // H_FADE
            h_elem.classList.remove('bright');
            _hBrightTimer = null;
          }, 8000); // H_HOLD
        }

        function toggleH() {
          triggerBright();
          if (h_elem.classList.contains('fade-in')) {
            h_elem.classList.replace('fade-in', 'fade-out');
          } else {
            h_elem.classList.replace('fade-out', 'fade-in');
          }
        }
        h_elem.addEventListener('click', toggleH);
        h_elem.addEventListener('touchend', e => { e.preventDefault(); toggleH(); });

        // --- #end: tap/click to trigger wobble ---
        const end = document.getElementById('end');
        function triggerEnd() {
          end.classList.remove('wobbling');
          // Force reflow so animation restarts
          void end.offsetWidth;
          end.classList.add('wobbling');
        }
        end.addEventListener('click', triggerEnd);
        end.addEventListener('touchend', e => { e.preventDefault(); triggerEnd(); });
        end.addEventListener('animationend', () => end.classList.remove('wobbling'));

        // --- Pac-Man chatbot modal ---
        const pacmanTrigger = document.getElementById('pacman-trigger');
        const chatModal = document.getElementById('chat-modal');
        const chatClose = document.getElementById('chat-close');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatLog = document.getElementById('chat-log');
        let chatReturnFocusEl = null;

        const botReply = (text) => {
          const content = text.toLowerCase();
          const hasWord = (word) => new RegExp(`\\b${word}\\b`, 'i').test(content);
          if (hasWord('hello') || hasWord('hi')) return 'HELLO HUMAN. SYSTEM STATUS: ONLINE.';
          if (hasWord('help')) return 'AVAILABLE COMMANDS: HELLO, HELP, GAME, STATUS.';
          if (hasWord('game')) return 'A STRANGE GAME. THE ONLY WINNING MOVE IS NOT TO PLAY.';
          if (hasWord('status')) return 'ALL SYSTEMS NOMINAL. DEFCON LEVEL: GREEN.';
          return 'INPUT RECEIVED. PROCESSING COMPLETE.';
        };

        const appendLine = (prefix, text) => {
          const item = document.createElement('li');
          item.textContent = `> ${prefix}: ${text}`;
          chatLog.appendChild(item);
          chatLog.scrollTop = chatLog.scrollHeight;
        };

        const openChat = () => {
          chatReturnFocusEl = document.activeElement;
          chatModal.classList.add('open');
          requestAnimationFrame(() => chatInput.focus());
        };
        const closeChat = () => {
          chatModal.classList.remove('open');
          if (chatReturnFocusEl) {
            chatReturnFocusEl.focus();
          } else {
            pacmanTrigger.focus();
          }
        };

        pacmanTrigger.addEventListener('click', openChat);
        chatClose.addEventListener('click', closeChat);
        chatModal.addEventListener('click', e => {
          if (e.target === chatModal) closeChat();
        });
        document.addEventListener('keydown', e => {
          if (!chatModal.classList.contains('open')) return;
          if (e.key === 'Escape') {
            closeChat();
            return;
          }
          if (e.key !== 'Tab') return;
          const focusable = chatModal.querySelectorAll(
            'button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
          );
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        });

        chatForm.addEventListener('submit', e => {
          e.preventDefault();
          const input = chatInput.value.trim();
          if (!input) return;
          appendLine('YOU', input);
          chatInput.value = '';
          setTimeout(() => appendLine('JOSHUA', botReply(input)), 240);
        });
      })();
    </script>
  </body>
</html>
